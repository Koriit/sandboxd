[package]
name = "sandbox-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
name = "sandbox_cli"
path = "src/lib.rs"

[[bin]]
name = "sandbox"
path = "src/main.rs"

[dependencies]
base64.workspace = true
chrono.workspace = true
clap.workspace = true
http-body-util.workspace = true
hyper.workspace = true
hyper-util.workspace = true
sandbox-core.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
# axum provides the minimal HTTP/1.1 server used by the binary-level
# regression test in `tests/events_binary.rs` to pin the `sandbox events`
# (non-follow) process exit behavior. See the `Connection: close` +
# drop-order fix in `src/main.rs::stream_events_to_stdout`.
axum.workspace = true
tempfile.workspace = true
