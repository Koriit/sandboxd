[profile.default]
retries = 0
fail-fast = true
# Integration tests use the `integration_*` name prefix and are run via
# the `integration` profile (see `make test-integration`). Filter them
# out of the default profile so `make test` / `cargo nextest run` stay
# hermetic with no Docker dependency.
#
# The `(^|::)` anchor matches the prefix in two places: at the start of
# bare test names from `tests/`-directory integration binaries (e.g.
# `integration_validator_nft_check`), and at any module boundary inside
# `#[cfg(test)] mod` unit tests in `src/` (e.g.
# `tcp::tests::integration_tcp_respects_concurrency_cap`). A bare `^`
# anchor would only catch the first form.
default-filter = 'not test(/(^|::)integration_/)'

[profile.integration]
# Opt-in profile for tests requiring out-of-process state (real gateway
# container, `nft -c` / `envoy --mode validate` CLIs, etc.). Selected by
# the `integration_*` name prefix so the set is self-describing at call
# sites — no `#[ignore]`, no env gate. See the default-profile comment
# above for why the `(^|::)` anchor is needed.
default-filter = 'test(/(^|::)integration_/)'

[[profile.integration.overrides]]
# Lima integration tests share the per-user `~/.lima/` state directory
# (limactl does not honour an alternate base path). Running them in
# parallel can race on golden-image / VM-creation locks. Serialise via
# the `lima` test group below.
filter = 'test(/^integration_lima/)'
test-group = 'lima'

[[profile.integration.overrides]]
# The orphan reaper sweeps every `sandbox-{12hex}`
# container/volume/network on the host whose session id isn't in the
# live set passed in. If it runs in parallel with the container
# runtime tests (which create `sandbox-{12hex}` containers with their
# own random session ids) the reaper will happily delete those
# containers out from under the lifecycle assertions. Serialise
# anything that touches the lite-mode `sandbox-{id}` Docker namespace
# via the shared `docker-sandbox-namespace` test group below.
#
# Additional touch points in the same namespace:
#   - `integration_rootless_docker_*` spawn full lite sessions (forced
#     override and default-hardened) and snapshot the `sandbox-*`
#     namespace pre/post; a parallel orphan-reaper or container-runtime
#     test would either reap their in-flight containers or pollute the
#     snapshot.
#   - `integration_default_hardened_docker_proceeds` does the same
#     positive-create exercise against the default-hardened stub.
#   - `integration_orphan_reaper_cidr.rs` exposes a second reaper
#     test file whose tests are named `integration_reaper_*` rather
#     than `integration_orphan_reaper_*`. Both prefixes belong in the
#     same `docker-sandbox-namespace` group — they create real
#     `sandbox-net-*` networks under the same IPAM space and would
#     race with each other and with the existing reaper /
#     container-runtime tests on parallel runs.
#   - `integration_route_helper_for_user_*` exercise daemon→helper
#     identity propagation by spinning up a real container in the
#     `sandbox-{12hex}` namespace via `ContainerRuntime::start` with a
#     stub route-helper binary; same namespace-pollution concern as
#     the runtime/reaper tests above.
#   - `integration_guest_refresh_container_backend` drives
#     `ContainerRuntime::refresh_guest_binary` against a real
#     `sandbox-{12hex}` container; a parallel orphan-reaper test
#     would reap the in-flight container between `runtime.stop` and
#     the post-refresh byte-equality assertion.
#   - `integration_guest_binary_*` (api-session-isolation spec
#     § 3.8.1) — `integration_guest_binary_swap_picked_up_by_new_sessions`
#     and `integration_guest_binary_shared_inode_across_sessions`
#     each create two real `sandbox-{12hex}` containers and assert on
#     their bind-mounted guest binaries; a parallel orphan-reaper
#     or other namespace-touching test would race the lifecycle
#     assertions, and concurrent docker rm against a container the
#     test still holds an explicit `runtime.delete` for has been
#     observed to surface as "removal of container ... is already
#     in progress" from dockerd. Grouped via the
#     `integration_guest_binary_` prefix so future tests in the
#     family inherit the serialisation without another config edit.
#   - `integration_create_session_container_*` exercise the daemon's
#     container-backend wiring end-to-end:
#     `integration_create_session_container_backend_round_trip` and
#     `integration_create_session_container_first_use_warning_surfaces`
#     drive `runtime.create()` + `runtime.start()` through the
#     dispatch table and produce real `sandbox-{12hex}` containers.
#     The remaining tests in the family
#     (`rejects_hardened`, `rejects_no_cache`,
#     `advertises_workspace_capabilities`) are hermetic; the
#     prefix-based filter pulls them all into the group, but
#     serialising a handful of fast hermetic tests costs nothing
#     and keeps the filter self-describing at the test-name level.
#   - `integration_create_stamps_owner_from_peercred` fires a Lima
#     `POST /sessions` against a real daemon; on hosts with docker
#     installed, the handler reaches `create_network` and briefly
#     allocates a `sandbox-net-{id}` bridge before the test reads
#     the persisted row and tears the daemon down. Belongs in the
#     same group so a parallel reaper does not race the cleanup.
filter = 'test(/^integration_orphan_reaper/) | test(/^integration_reaper_/) | test(/^integration_container_runtime/) | test(/^integration_rootless_docker/) | test(/^integration_default_hardened_docker/) | test(/^integration_route_helper_for_user_/) | test(/^integration_route_helper_missing_for_user_/) | test(/^integration_guest_refresh_container_backend/) | test(/^integration_guest_binary_/) | test(/^integration_create_session_container_/) | test(/^integration_create_stamps_owner_from_peercred/)'
test-group = 'docker-sandbox-namespace'

[test-groups]
lima = { max-threads = 1 }
docker-sandbox-namespace = { max-threads = 1 }
