[profile.default]
retries = 0
fail-fast = true
# Integration tests use the `integration_*` name prefix and are run via
# the `integration` profile (see `make test-integration`). Filter them
# out of the default profile so `make test` / `cargo nextest run` stay
# hermetic with no Docker dependency.
default-filter = 'not test(/^integration_/)'

[profile.integration]
# Opt-in profile for tests requiring out-of-process state (real gateway
# container, `nft -c` / `envoy --mode validate` CLIs, etc.). Selected by
# the `integration_*` name prefix so the set is self-describing at call
# sites — no `#[ignore]`, no env gate.
default-filter = 'test(/^integration_/)'

[[profile.integration.overrides]]
# Lima integration tests share the per-user `~/.lima/` state directory
# (limactl does not honour an alternate base path). Running them in
# parallel can race on golden-image / VM-creation locks. Serialise via
# the `lima` test group below.
filter = 'test(/^integration_lima/)'
test-group = 'lima'

[[profile.integration.overrides]]
# The orphan reaper (M11-S5 Phase 5B) sweeps every `sandbox-{12hex}`
# container/volume/network on the host whose session id isn't in the
# live set passed in. If it runs in parallel with the container
# runtime tests (which create `sandbox-{12hex}` containers with their
# own random session ids) the reaper will happily delete those
# containers out from under the lifecycle assertions. Serialise
# anything that touches the lite-mode `sandbox-{id}` Docker namespace
# via the shared `docker-sandbox-namespace` test group below.
#
# M11-S8 Wave 3 added two more touch points:
#   - `integration_rootless_docker_*` spawn full lite sessions (#2
#     forced override, #4 default-hardened) and snapshot the
#     `sandbox-*` namespace pre/post (#1 rejection); a parallel
#     orphan-reaper or container-runtime test would either reap their
#     in-flight containers or pollute the snapshot.
#   - `integration_default_hardened_docker_proceeds` does the same
#     positive-create exercise as #2 against the default-hardened
#     stub.
#
# M11-S10 added a second reaper test file
# (`integration_orphan_reaper_cidr.rs`) whose tests are named
# `integration_reaper_*` rather than `integration_orphan_reaper_*`
# (per the M11-S10 spec). Both prefixes belong in the same
# `docker-sandbox-namespace` group — they create real
# `sandbox-net-*` networks under the same IPAM space and would race
# with each other and with the existing reaper / container-runtime
# tests on parallel runs.
filter = 'test(/^integration_orphan_reaper/) | test(/^integration_reaper_/) | test(/^integration_container_runtime/) | test(/^integration_rootless_docker/) | test(/^integration_default_hardened_docker/)'
test-group = 'docker-sandbox-namespace'

[test-groups]
lima = { max-threads = 1 }
docker-sandbox-namespace = { max-threads = 1 }
