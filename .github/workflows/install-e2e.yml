name: Install E2E

on:
  workflow_dispatch:

jobs:
  install-e2e:
    # Lima requires KVM / nested virtualization. GitHub-hosted runners
    # do not expose /dev/kvm; this job rides on the same
    # `[self-hosted, kvm]` runner label `ci.yml`'s `e2e-matrix` job
    # uses.
    runs-on: [self-hosted, kvm]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88.0'

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sandboxd/target
          key: install-e2e-${{ hashFiles('sandboxd/**/Cargo.lock') }}

      - name: Build local release tarball
        run: ./tests/install-e2e/build-local-tarball.sh

      - name: Run install/uninstall harness
        run: |
          cd tests/install-e2e
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m pytest -v --timeout=900
