name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sandboxd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sandboxd/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Build
        run: make build

      - name: Test
        run: make test

  # Shellcheck for the install / uninstall scripts. Both scripts must pass
  # POSIX-sh (`-s sh`) plus stylistic warnings (`-S style`). The scripts
  # themselves are not yet present; until then the step short-circuits
  # when neither file exists rather than failing CI.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: |
          if [ -f scripts/install.sh ] || [ -f scripts/uninstall.sh ]; then
            shellcheck -s sh -S style scripts/install.sh scripts/uninstall.sh
          else
            echo "scripts/install.sh and scripts/uninstall.sh not present yet; skipping."
          fi

  # Integration tests: every `integration_*`-prefixed test in the Rust
  # workspace. These require out-of-process state — a real gateway container,
  # a cap'd route helper binary, the `nft -c` / `envoy --mode validate` CLIs
  # shipped inside the gateway image, and Docker for the container-runtime
  # tests. The `make test-integration` target handles building the gateway
  # image, lite image, and cap'd route helper before running the suite.
  #
  # `sudo setcap` (used by `install-route-helper-test-cap`) requires root;
  # GitHub-hosted `ubuntu-latest` runners provide passwordless sudo. The
  # `libcap2-bin` package (setcap/getcap) is pre-installed on ubuntu-latest.
  integration:
    runs-on: ubuntu-latest
    needs: cargo
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sandboxd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sandboxd/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Install limactl
        run: |
          curl -fsSL https://github.com/lima-vm/lima/releases/download/v2.1.0/lima-2.1.0-Linux-x86_64.tar.gz \
            | sudo tar xzf - -C /usr/local --strip-components=1 ./bin/limactl
          limactl --version

      - name: Run integration tests
        run: make test-integration

  # PR-time + push-to-master: container backend only (~5-10 min).
  # Lite has no Lima/KVM dependency, so this job runs unmodified on stock
  # GitHub-hosted `ubuntu-latest` runners.
  e2e-container:
    if: false
    runs-on: ubuntu-latest
    needs: cargo
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sandboxd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sandboxd/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run container-only E2E suite
        run: make test-e2e-container

  # Merge-to-master: full matrix -- both backends (~30-45 min).
  #
  # The Lima half of the matrix requires `/dev/kvm` (nested virtualization),
  # which stock GitHub-hosted `ubuntu-latest` runners do NOT provide. The
  # job is therefore gated on a `[self-hosted, kvm]` runner label. Until
  # that runner is provisioned, the job will queue without scheduling and
  # the matrix coverage will not run on push-to-master.
  #
  # We deliberately do NOT silently degrade this job to container-only:
  # that would defeat the policy and lose the Lima coverage that the
  # matrix exists to preserve. See the CI policy section in
  # `docs/internal/milestones/M11.md` and the runner-provisioning handoff
  # in `.tasks/handoffs/`.
  e2e-matrix:
    if: false
    runs-on: [self-hosted, kvm]
    needs: cargo
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sandboxd/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sandboxd/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run full-matrix E2E suite
        run: make test-e2e-matrix
