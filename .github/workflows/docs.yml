name: Docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'site/**'
      - 'scripts/install.sh'
      - 'scripts/uninstall.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: site/.nvmrc
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies (npm ci)
        if: hashFiles('site/package-lock.json') != ''
        run: npm ci

      - name: Install dependencies (npm install fallback)
        if: hashFiles('site/package-lock.json') == ''
        run: npm install

      - name: Install Chromium for rehype-mermaid
        run: npx playwright install --with-deps chromium

      # Stage the install/uninstall scripts inside site/public/ so they ride
      # the Pages deployment. Astro copies site/public/ verbatim into
      # site/dist/, so the resulting URLs are
      #   https://Koriit.github.io/sandboxd/install.sh
      #   https://Koriit.github.io/sandboxd/uninstall.sh
      # We copy at build time (rather than symlinking) so the repo's
      # canonical source stays under scripts/ and the staged file is a
      # plain regular file regardless of build-environment symlink
      # behaviour.
      - name: Stage install scripts
        working-directory: ${{ github.workspace }}
        run: |
          cp scripts/install.sh site/public/install.sh
          cp scripts/uninstall.sh site/public/uninstall.sh

      - name: Type-check and Astro check
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
