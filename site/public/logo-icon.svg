<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 370" stroke-linejoin="round" stroke-linecap="round">
  <defs>
    <linearGradient id="metal" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"    stop-color="#FAFAFA"/>
      <stop offset="0.3"  stop-color="#D6D8DC"/>
      <stop offset="0.6"  stop-color="#8A8F96"/>
      <stop offset="1"    stop-color="#3F434A"/>
    </linearGradient>
    <linearGradient id="metalShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="woodTop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#D29456"/>
      <stop offset="1" stop-color="#8B5320"/>
    </linearGradient>
    <linearGradient id="woodFront" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#B8793D"/>
      <stop offset="1" stop-color="#5E3510"/>
    </linearGradient>
    <linearGradient id="orange" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFA04D"/>
      <stop offset="1" stop-color="#C9400A"/>
    </linearGradient>
    <linearGradient id="silver" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#F4F4F4"/>
      <stop offset="1" stop-color="#AEB2B8"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#FFE9A8"/>
      <stop offset="0.35" stop-color="#FF9024"/>
      <stop offset="0.85" stop-color="#B83308"/>
      <stop offset="1"    stop-color="#5B1502"/>
    </radialGradient>
    <radialGradient id="visorHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#FF9024" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#FF6A13" stop-opacity="0.18"/>
      <stop offset="1"   stop-color="#FF6A13" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flameCore" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"    stop-color="#FFD24A"/>
      <stop offset="0.35" stop-color="#FF8A1C"/>
      <stop offset="0.75" stop-color="#E54410"/>
      <stop offset="1"    stop-color="#A82B06"/>
    </linearGradient>
    <linearGradient id="flameBack" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"    stop-color="#FF7A1C"/>
      <stop offset="0.6"  stop-color="#C9400A"/>
      <stop offset="1"    stop-color="#6E1B02"/>
    </linearGradient>
    <clipPath id="flameClip">
      <!-- Clip at y=236 to hide the flame's pedestal bar but preserve the curvy tongue bottoms above it. -->
      <rect x="0" y="0" width="420" height="236"/>
    </clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- UP ARROW (left) -->
  <defs>
    <linearGradient id="arrowCream" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F2F3F5"/>
      <stop offset="1"   stop-color="#C9CED5"/>
    </linearGradient>
    <linearGradient id="arrowOrange" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#FFAA55"/>
      <stop offset="0.5" stop-color="#FF7A1C"/>
      <stop offset="1"   stop-color="#C24008"/>
    </linearGradient>
  </defs>

  <!-- FLAMES (behind everything, rising from crate) -->
  <g clip-path="url(#flameClip)">
    <!-- back flame: wider, darker, for depth -->
    <g transform="translate(51 20) scale(0.343 0.1785)">
      <g transform="translate(0 1280) scale(0.1 -0.1)">
        <path fill="url(#flameBack)" opacity="0.9" d="M4142 12726 c-348 -395 -507 -917 -463 -1516 21 -285 54 -478 166 -965 92 -404 108 -498 103 -630 -4 -125 -23 -175 -81 -219 -60 -46 -66 -43 -162 89 -125 171 -220 281 -374 435 -144 143 -235 221 -366 312 -169 118 -378 211 -545 242 -79 15 -310 22 -323 10 -3 -3 18 -38 47 -78 29 -39 96 -136 149 -216 341 -519 542 -1025 609 -1530 16 -125 16 -460 -1 -580 -17 -123 -71 -333 -111 -435 -35 -89 -89 -195 -99 -195 -4 0 -36 35 -71 77 -95 113 -274 289 -396 389 -318 262 -733 473 -1050 534 -169 32 -284 24 -284 -21 0 -11 34 -45 83 -82 498 -391 748 -1123 723 -2122 -5 -212 -27 -499 -42 -547 -4 -14 -21 -5 -92 51 -335 263 -721 464 -992 515 -94 18 -232 21 -311 6 -62 -11 -178 -67 -228 -108 l-33 -28 113 -64 c542 -302 795 -635 827 -1086 14 -187 -1 -355 -73 -798 -20 -120 -42 -274 -50 -341 -62 -534 5 -1173 177 -1680 222 -655 635 -1236 1146 -1614 l84 -61 -296 0 -296 0 0 -235 0 -235 2855 0 2855 0 0 235 0 235 -342 0 -343 0 155 78 c1134 574 1881 1547 2085 2717 45 265 50 320 49 605 -2 692 -125 1265 -335 1559 -24 33 -40 48 -43 40 -2 -8 -14 -45 -26 -84 -63 -200 -201 -365 -342 -407 -51 -15 -58 -5 -58 82 0 98 7 129 153 715 129 514 145 647 111 934 -46 395 -204 734 -467 1000 -87 88 -241 211 -264 211 -5 0 -6 -27 -2 -67 12 -101 11 -456 -1 -553 -25 -201 -82 -416 -147 -544 -42 -85 -102 -167 -172 -239 -56 -58 -145 -127 -163 -127 -16 0 -21 96 -28 625 -10 707 -25 935 -86 1300 -155 929 -532 1546 -1129 1843 -90 45 -233 102 -255 102 -4 0 22 -66 60 -147 186 -406 286 -734 315 -1034 8 -80 -47 -580 -62 -565 -2 2 -15 59 -29 127 -107 528 -464 1184 -954 1754 -166 194 -261 357 -375 645 -163 411 -310 986 -400 1570 -15 96 -30 178 -34 181 -3 4 -34 -26 -69 -65z"/>
      </g>
    </g>
    <!-- front flame: brighter core, slightly smaller -->
    <g transform="translate(75 20) scale(0.289 0.1785)">
      <g transform="translate(0 1280) scale(0.1 -0.1)">
        <path fill="url(#flameCore)" d="M4142 12726 c-348 -395 -507 -917 -463 -1516 21 -285 54 -478 166 -965 92 -404 108 -498 103 -630 -4 -125 -23 -175 -81 -219 -60 -46 -66 -43 -162 89 -125 171 -220 281 -374 435 -144 143 -235 221 -366 312 -169 118 -378 211 -545 242 -79 15 -310 22 -323 10 -3 -3 18 -38 47 -78 29 -39 96 -136 149 -216 341 -519 542 -1025 609 -1530 16 -125 16 -460 -1 -580 -17 -123 -71 -333 -111 -435 -35 -89 -89 -195 -99 -195 -4 0 -36 35 -71 77 -95 113 -274 289 -396 389 -318 262 -733 473 -1050 534 -169 32 -284 24 -284 -21 0 -11 34 -45 83 -82 498 -391 748 -1123 723 -2122 -5 -212 -27 -499 -42 -547 -4 -14 -21 -5 -92 51 -335 263 -721 464 -992 515 -94 18 -232 21 -311 6 -62 -11 -178 -67 -228 -108 l-33 -28 113 -64 c542 -302 795 -635 827 -1086 14 -187 -1 -355 -73 -798 -20 -120 -42 -274 -50 -341 -62 -534 5 -1173 177 -1680 222 -655 635 -1236 1146 -1614 l84 -61 -296 0 -296 0 0 -235 0 -235 2855 0 2855 0 0 235 0 235 -342 0 -343 0 155 78 c1134 574 1881 1547 2085 2717 45 265 50 320 49 605 -2 692 -125 1265 -335 1559 -24 33 -40 48 -43 40 -2 -8 -14 -45 -26 -84 -63 -200 -201 -365 -342 -407 -51 -15 -58 -5 -58 82 0 98 7 129 153 715 129 514 145 647 111 934 -46 395 -204 734 -467 1000 -87 88 -241 211 -264 211 -5 0 -6 -27 -2 -67 12 -101 11 -456 -1 -553 -25 -201 -82 -416 -147 -544 -42 -85 -102 -167 -172 -239 -56 -58 -145 -127 -163 -127 -16 0 -21 96 -28 625 -10 707 -25 935 -86 1300 -155 929 -532 1546 -1129 1843 -90 45 -233 102 -255 102 -4 0 22 -66 60 -147 186 -406 286 -734 315 -1034 8 -80 -47 -580 -62 -565 -2 2 -15 59 -29 127 -107 528 -464 1184 -954 1754 -166 194 -261 357 -375 645 -163 411 -310 986 -400 1570 -15 96 -30 178 -34 181 -3 4 -34 -26 -69 -65z"/>
      </g>
    </g>
  </g>

  <g filter="url(#shadow)" stroke="#7A7F86" stroke-width="3">
    <path d="M54 191
             L20 231
             L38 231
             L38 289
             L70 289
             L70 231
             L88 231 Z"
          fill="url(#arrowCream)"/>
    <rect x="36" y="301" width="36" height="14" rx="3"
          fill="url(#arrowCream)"/>
  </g>

  <!-- DOWN ARROW (right) — full length with pedestal on top -->
  <g filter="url(#shadow)" stroke="#8A2E08" stroke-width="3">
    <rect x="348" y="191" width="36" height="14" rx="3"
          fill="url(#arrowOrange)"/>
    <path d="M366 315
             L400 275
             L382 275
             L382 217
             L350 217
             L350 275
             L332 275 Z"
          fill="url(#arrowOrange)"/>
  </g>

  <!-- CRATE: back rim (behind the robot body) -->
  <g stroke="#1a1a1a" stroke-width="3">
    <path d="M118 215
             L302 215
             L302 262
             L118 262 Z"
          fill="url(#woodTop)"/>
    <!-- Inner shadow — the "pit" the robot rises from -->
    <path d="M150 215
             L270 215
             L270 246
             L150 246 Z"
          fill="#2E1706"/>
  </g>

  <!-- ROBOT HEAD -->
  <g>
    <!-- ear/headphone cups (behind head) -->
    <g stroke="#1a1a1a" stroke-width="3">
      <ellipse cx="148" cy="166" rx="22" ry="26" fill="url(#metal)"/>
      <ellipse cx="272" cy="166" rx="22" ry="26" fill="url(#metal)"/>
      <ellipse cx="148" cy="168" rx="11" ry="14" fill="#1F2328"/>
      <ellipse cx="272" cy="168" rx="11" ry="14" fill="#1F2328"/>
    </g>
    <!-- head shell -->
    <path d="M160 110
             Q 160 92, 178 92
             L 242 92
             Q 260 92, 260 110
             L 260 212
             Q 260 228, 242 228
             L 178 228
             Q 160 228, 160 212 Z"
          fill="url(#metal)" stroke="#1a1a1a" stroke-width="3"/>
    <!-- chrome shine band -->
    <path d="M168 104
             L 252 104
             L 250 118
             L 170 118 Z"
          fill="url(#metalShine)"/>
    <!-- top antenna stud -->
    <circle cx="210" cy="86" r="5" fill="#3F434A" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="210" y1="81" x2="210" y2="70" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- visor frame -->
    <path d="M166 140
             L254 140
             L254 178
             Q 254 186, 246 186
             L 174 186
             Q 166 186, 166 178 Z"
          fill="#151515" stroke="#1a1a1a" stroke-width="3"/>
    <!-- eyes -->
    <ellipse cx="188" cy="160" rx="13" ry="10" fill="url(#eyeGlow)"/>
    <ellipse cx="232" cy="160" rx="13" ry="10" fill="url(#eyeGlow)"/>
    <!-- visor reflection highlights (symmetric) -->
    <path d="M172 146 L 198 146 L 196 152 L 172 152 Z" fill="#FFFFFF" opacity="0.22"/>
    <path d="M222 146 L 248 146 L 248 152 L 224 152 Z" fill="#FFFFFF" opacity="0.22"/>
    <!-- mouth grille -->
    <g stroke="#1a1a1a" stroke-width="1.8" fill="none">
      <line x1="188" y1="204" x2="232" y2="204"/>
      <line x1="188" y1="211" x2="232" y2="211"/>
      <line x1="188" y1="218" x2="232" y2="218"/>
    </g>
  </g>

  <!-- CRATE FRONT (in front of robot torso area) -->
  <g stroke="#1a1a1a" stroke-width="3">
    <!-- front panel -->
    <path d="M108 225 L312 225 L312 335 L108 335 Z" fill="url(#woodFront)"/>
    <!-- tonal band: middle plank slightly darker -->
    <path d="M108 262 L312 262 L312 298 L108 298 Z" fill="#2E1706" opacity="0.10" stroke="none"/>
    <!-- tonal band: bottom plank very slightly lighter -->
    <path d="M108 298 L312 298 L312 335 L108 335 Z" fill="#FFFFFF" opacity="0.04" stroke="none"/>
    <!-- plank grooves -->
    <g stroke="#2A1406" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="112" y1="262" x2="316" y2="262"/>
      <line x1="108" y1="298" x2="319" y2="298"/>
    </g>
    <!-- horizontal fibers (short dark strokes) -->
    <g stroke="#3A1F08" stroke-width="0.6" fill="none" opacity="0.45" stroke-linecap="round">
      <path d="M120 241 Q 130 240, 140 241"/>
      <path d="M230 238 Q 250 237, 272 239"/>
      <path d="M175 250 L 195 250"/>
      <path d="M128 275 L 146 274"/>
      <path d="M250 268 Q 265 267, 278 268"/>
      <path d="M182 286 L 210 286"/>
      <path d="M280 282 L 300 283"/>
      <path d="M125 310 L 144 309"/>
      <path d="M210 304 Q 225 303, 244 305"/>
      <path d="M272 320 L 295 321"/>
    </g>
    <!-- horizontal cracks (thin dark splits) -->
    <g stroke="#1F0B03" stroke-width="0.5" fill="none" opacity="0.55" stroke-linecap="round">
      <path d="M188 248 Q 210 247, 232 248"/>
      <path d="M140 282 L 175 281"/>
      <path d="M258 306 Q 278 305, 298 306"/>
    </g>
    <!-- Natural wood grain: flowing lines deflecting around knot -->
    <g stroke="#2A1406" stroke-width="1.0" fill="none" opacity="0.7" stroke-linecap="round">
      <!-- Top plank right-to-left: flowing lines -->
      <path d="M316 235 Q 280 232, 240 236 Q 220 238, 210 236"/>
      <path d="M310 250 Q 275 252, 235 249"/>
      <!-- Middle plank left: flowing lines (avoiding knot at 225,276) -->
      <path d="M104 272 Q 140 269, 180 273 Q 195 275, 208 272"/>
      <path d="M108 285 Q 145 287, 185 284"/>
      <!-- Bottom plank: lines flowing past knot (163, 318), bowing over and under -->
      <path d="M100 305 Q 140 303, 163 301 Q 186 303, 225 305"/>
      <path d="M100 314 Q 130 313, 150 312 Q 157 309, 163 308 Q 169 309, 176 312 Q 196 313, 225 314"/>
      <path d="M100 322 Q 130 322, 150 324 Q 157 327, 163 328 Q 169 327, 176 324 Q 196 322, 225 322"/>
      <path d="M100 331 Q 140 333, 163 332 Q 186 333, 225 331"/>
    </g>
    <!-- counter-grain highlights (horizontal) -->
    <g stroke="#D9A16B" stroke-width="0.6" fill="none" opacity="0.4" stroke-linecap="round">
      <path d="M165 272 L 180 272"/>
      <path d="M220 315 Q 235 314, 250 316"/>
      <path d="M148 240 Q 165 239, 182 241"/>
      <path d="M255 283 L 275 282"/>
    </g>
    <!-- knots -->
    <g stroke="#1F0B03" stroke-width="0.9">
      <ellipse cx="225" cy="276" rx="7" ry="4.5" fill="#5E3510"/>
      <ellipse cx="225" cy="276" rx="3" ry="2" fill="#2E1706" stroke="none"/>
      <ellipse cx="163" cy="318" rx="5" ry="3" fill="#5E3510"/>
      <ellipse cx="163" cy="318" rx="2" ry="1" fill="#2E1706" stroke="none"/>
    </g>
    <!-- left corner post -->
    <path d="M98 225 L122 225 L122 335 L98 335 Z" fill="#5E3510"/>
    <!-- right corner post -->
    <path d="M298 225 L322 225 L322 335 L298 335 Z" fill="#5E3510"/>
    <!-- metal rivets/nails (4 corners only) -->
    <g fill="#C9CDD2" stroke="#1a1a1a" stroke-width="1">
      <circle cx="110" cy="234" r="3"/>
      <circle cx="110" cy="326" r="3"/>
      <circle cx="310" cy="234" r="3"/>
      <circle cx="310" cy="326" r="3"/>
    </g>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="210" cy="348" rx="115" ry="7" fill="#000000" opacity="0.22" filter="url(#soft)"/>
</svg>
