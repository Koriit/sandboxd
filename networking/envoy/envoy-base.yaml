# Envoy base configuration — pass-through mode
#
# This config does two things:
#   1. TCP pass-through: listens on 10000, forwards to original destination
#   2. Admin interface on 127.0.0.1:9901 for health checks
#
# In M4, this will be extended with:
#   - SNI-based routing for TLS traffic
#   - HTTP forwarding to mitmproxy for inspection
#   - Per-policy filter chains

static_resources:
  listeners:
    - name: tcp_passthrough
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_passthrough
                cluster: original_dst

  clusters:
    - name: original_dst
      type: ORIGINAL_DST
      lb_policy: CLUSTER_PROVIDED
      connect_timeout: 10s

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
