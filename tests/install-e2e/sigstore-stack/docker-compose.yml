# Hand-rolled Sigstore stack for install-e2e tests.
#
# Seven containers:
#   - oidc                  nginx serving an OIDC discovery doc + JWKS as
#                           if it were https://token.actions.githubusercontent.com.
#   - tesseract             standalone CT log with POSIX storage; Fulcio
#                           writes SCTs here.
#   - mysql                 Trillian backing store + Rekor index storage.
#   - trillian-log-server   Trillian.
#   - trillian-log-signer   Trillian.
#   - rekor                 Rekor transparency log; backed by Trillian.
#   - fulcio                Issues signing certs against JWTs minted with
#                           the oidc container's signing key.
#
# State lives under ./state/ (gitignored, generated by init.sh).

name: sandboxd-sigstore

services:
  oidc:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      sigstore:
        aliases:
          - oidc
          - token.actions.githubusercontent.com
    ports:
      - "127.0.0.1:8443:443"
    volumes:
      - ./oidc/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./state/certs/oidc:/etc/oidc-tls:ro
      - ./state/oidc:/etc/oidc-static:ro
    healthcheck:
      test: ["CMD", "wget", "-O-", "--no-check-certificate", "-q", "https://127.0.0.1/healthz"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 3s

  tesseract:
    # Pinned by digest for reproducibility. To bump: `docker pull
    # ghcr.io/transparency-dev/tesseract/posix:latest` then read
    # `RepoDigests` from `docker image inspect`. Pin lockstep with any
    # refresh of the Fulcio image so the CT-log/Fulcio compatibility
    # matrix stays observed.
    image: ghcr.io/transparency-dev/tesseract/posix@sha256:0fe8cbf3e0c0c0fb95c323e9809cef1ca6851c7c4b200b089c72e5da15e5d179
    restart: unless-stopped
    networks:
      - sigstore
    user: root
    volumes:
      - ./state/ct-log:/etc/ct-log:ro
      - ./state/fulcio-root:/etc/fulcio-root:ro
      - ct_storage:/ctfe
    command:
      - "--private_key=/etc/ct-log/privkey.pem"
      - "--origin=ctlog"
      - "--storage_dir=/ctfe"
      - "--roots_pem_file=/etc/fulcio-root/root.pem"
      - "--ext_key_usages=CodeSigning"
      - "--http_endpoint=0.0.0.0:6962"
    # The image is a distroless ko build with no shell or net tools, so
    # we can't express an in-container healthcheck. The smoke-test
    # fixture detects tesseract readiness transitively via Fulcio's
    # /healthz endpoint — Fulcio refuses to serve until its configured
    # --ct-log-url responds.

  mysql:
    image: gcr.io/trillian-opensource-ci/db_server:v1.4.0
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - sigstore
    environment:
      MYSQL_ROOT_PASSWORD: zaphod
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: zaphod
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin -h 127.0.0.1 --user=$$MYSQL_USER --password=$$MYSQL_ROOT_PASSWORD -s ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  trillian-log-server:
    image: gcr.io/trillian-opensource-ci/log_server:latest
    restart: unless-stopped
    networks:
      - sigstore
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - "--quota_system=noop"
      - "--storage_system=mysql"
      - "--mysql_uri=test:zaphod@tcp(mysql:3306)/test"
      - "--rpc_endpoint=0.0.0.0:8090"
      - "--http_endpoint=0.0.0.0:8091"
      - "--alsologtostderr"
    # Distroless image — no shell or net tools — so no in-container
    # healthcheck. depends_on uses service_started for downstream svcs.

  trillian-log-signer:
    image: gcr.io/trillian-opensource-ci/log_signer:latest
    restart: unless-stopped
    networks:
      - sigstore
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - "--quota_system=noop"
      - "--storage_system=mysql"
      - "--mysql_uri=test:zaphod@tcp(mysql:3306)/test"
      - "--rpc_endpoint=0.0.0.0:8090"
      - "--http_endpoint=0.0.0.0:8091"
      - "--force_master"
      - "--alsologtostderr"
    # Distroless image — see trillian-log-server above.

  rekor:
    image: gcr.io/projectsigstore/rekor-server:v1.5.1
    restart: unless-stopped
    networks:
      - sigstore
    depends_on:
      trillian-log-server:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    command:
      - "serve"
      - "--trillian_log_server.address=trillian-log-server"
      - "--trillian_log_server.port=8090"
      - "--rekor_server.address=0.0.0.0"
      - "--rekor_server.signer=memory"
      - "--enable_attestation_storage=false"
      - "--search_index.storage_provider=mysql"
      - "--search_index.mysql.dsn=test:zaphod@tcp(mysql:3306)/test"
    # Distroless image — see trillian-log-server above. The fixture
    # probes /ping from the host.

  fulcio:
    image: gcr.io/projectsigstore/fulcio:v1.8.5
    restart: unless-stopped
    networks:
      - sigstore
    depends_on:
      oidc:
        condition: service_healthy
      tesseract:
        condition: service_started
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - ./state/fulcio/config.yaml:/etc/fulcio-config/config.yaml:ro
      - ./state/fulcio-root:/etc/fulcio:ro
    command:
      - "serve"
      - "--host=0.0.0.0"
      - "--port=5555"
      - "--grpc-port=5554"
      - "--ca=fileca"
      - "--fileca-cert=/etc/fulcio/root.pem"
      - "--fileca-key=/etc/fulcio/root.key"
      - "--fileca-key-passwd=sandboxd-test"
      # Tesseract uses --origin as a checkpoint label, NOT a URL prefix:
      # it serves at /ct/v1/... at the root of the listen port.
      - "--ct-log-url=http://tesseract:6962"
      - "--config-path=/etc/fulcio-config/config.yaml"
    # Distroless image — see trillian-log-server above. The fixture
    # probes /healthz from the host.

volumes:
  ct_storage: {}

networks:
  sigstore:
    driver: bridge
