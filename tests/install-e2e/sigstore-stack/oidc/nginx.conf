worker_processes 1;
error_log /dev/stderr info;
events { worker_connections 64; }

http {
  access_log /dev/stdout;
  server_tokens off;

  server {
    # Plain HTTP (not used; kept so nginx doesn't 4xx when probed).
    listen 80;
    server_name _;
    return 426;
  }

  server {
    listen 443 ssl;
    server_name token.actions.githubusercontent.com oidc oidc.local;

    ssl_certificate     /etc/oidc-tls/cert.pem;
    ssl_certificate_key /etc/oidc-tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Standard OIDC discovery endpoint.
    location = /.well-known/openid-configuration {
      default_type application/json;
      alias /etc/oidc-static/discovery.json;
    }

    # JWKS endpoint referenced by the discovery doc.
    location = /keys {
      default_type application/json;
      alias /etc/oidc-static/jwks.json;
    }

    # Healthcheck.
    location = /healthz {
      default_type text/plain;
      return 200 "ok\n";
    }

    location / {
      return 404;
    }
  }
}
